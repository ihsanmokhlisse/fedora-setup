[org/gnome/desktop/interface]
gtk-theme='Adwaita'
icon-theme='Adwaita'
cursor-theme='Adwaita'
color-scheme='default'
enable-animations=true
font-name='Adwaita Sans 11'
document-font-name='Adwaita Sans 12'
monospace-font-name='Adwaita Mono 11'
font-hinting='medium'
text-scaling-factor=0.94
toolkit-accessibility=false

[org/gnome/desktop/wm/preferences]
theme='Adwaita'
titlebar-font='Adwaita Sans Bold 11'

[org/gnome/desktop/input-sources]
show-all-sources=true

[org/gnome/settings-daemon/plugins/media-keys]
screensaver=['<Super>l']

[org/gnome/desktop/session]
idle-delay=uint32 900

[org/gnome/mutter]
edge-tiling=true

[org/gnome/shell/extensions/blur-my-shell]
settings-version=2

[org/gnome/shell/extensions/blur-my-shell/appfolder]
brightness=0.6
sigma=30

[org/gnome/shell/extensions/blur-my-shell/dash-to-dock]
blur=true
brightness=0.6
sigma=30
static-blur=true
style-dash-to-dock=0

[org/gnome/shell/extensions/blur-my-shell/panel]
brightness=0.6
sigma=30

[org/gnome/shell/extensions/blur-my-shell/window-list]
brightness=0.6
sigma=30

[org/gnome/shell/extensions/caffeine]
cli-toggle=false
indicator-position-max=1

[org/gnome/shell/extensions/coverflowalttab]
switcher-background-color=(1.0, 1.0, 1.0)

[org/gnome/shell/extensions/dash-to-dock]
apply-custom-theme=true
autohide-in-fullscreen=true
background-opacity=0.8
custom-theme-shrink=true
dash-max-icon-size=32
dock-position='BOTTOM'
extend-height=false
height-fraction=0.95
icon-size-fixed=true
intellihide-mode='ALL_WINDOWS'
preferred-monitor=-2
preview-size-scale=0.76

[org/gnome/shell/extensions/ding]
check-x11wayland=true

[org/gnome/shell/extensions/gtile]
follow-cursor=true

[org/gnome/shell/extensions/lockscreen-extension]
hide-lockscreen-extension-button=true

[org/gnome/shell/extensions/pop-shell]
tile-by-default=false
focus-right=['<Super>Right', '<Super>KP_Right']

[org/gnome/shell/extensions/bingwallpaper]
set-lock-screen=true
download-folder='~/Pictures/BingWallpaper/'
