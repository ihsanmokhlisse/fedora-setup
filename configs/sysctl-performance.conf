# Fedora Performance Optimization — Kernel parameters
# Deployed to /etc/sysctl.d/99-performance.conf

# ── Network Performance ──

# Use BBR congestion control (Google's algorithm, much better than cubic)
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# TCP Fast Open (client + server)
net.ipv4.tcp_fastopen = 3

# Increase network buffer sizes (16MB)
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.core.rmem_default = 1048576
net.core.wmem_default = 1048576
net.ipv4.tcp_rmem = 4096 1048576 16777216
net.ipv4.tcp_wmem = 4096 1048576 16777216

# Increase connection backlog
net.core.netdev_max_backlog = 16384
net.core.somaxconn = 8192

# Reduce TCP keepalive time
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_intvl = 10
net.ipv4.tcp_keepalive_probes = 6

# Enable TCP window scaling
net.ipv4.tcp_window_scaling = 1

# Reuse TIME_WAIT sockets
net.ipv4.tcp_tw_reuse = 1

# ── Memory / I/O Performance ──

# Reduce swappiness (prefer RAM over swap)
vm.swappiness = 10
vm.vfs_cache_pressure = 50

# Increase inotify watchers (for IDEs, file watchers)
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 1024

# Increase file descriptor limits
fs.file-max = 2097152

# Increase max memory map areas (for large apps, JVMs, databases)
vm.max_map_count = 1048576
