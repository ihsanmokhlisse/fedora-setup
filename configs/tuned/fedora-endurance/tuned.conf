[main]
summary=Maximum battery endurance with balanced performance
include=balanced

[cpu]
governor=powersave
energy_perf_bias=balance_power
energy_performance_preference=balance_power
min_perf_pct=0
max_perf_pct=100
no_turbo=0

[disk]
readahead=4096
elevator=mq-deadline

[sysctl]
# Batch disk writes for power savings
vm.laptop_mode=5
vm.dirty_writeback_centisecs=6000
vm.dirty_expire_centisecs=6000
vm.dirty_ratio=20
vm.dirty_background_ratio=5

# Disable NMI watchdog (saves ~1W)
kernel.nmi_watchdog=0

# Memory pressure tuning
vm.swappiness=10
vm.vfs_cache_pressure=50

[sysfs]
# PCIe Active State Power Management — maximum power savings
/sys/module/pcie_aspm/parameters/policy=powersupersave

[audio]
timeout=1

[usb]
autosuspend=1

[scsi_host]
alpm=med_power_with_dipm

[net]
wake_on_lan=*;0;

[video]
radeon_powersave=auto
