# Fedora Endurance — Power saving kernel parameters
# Deployed to /etc/sysctl.d/99-power.conf
#
# Note: swappiness and vfs_cache_pressure are set in sysctl-performance.conf.
# Only power-specific parameters are listed here to avoid conflicts.

vm.laptop_mode = 5
vm.dirty_writeback_centisecs = 6000
vm.dirty_expire_centisecs = 6000
vm.dirty_ratio = 20
vm.dirty_background_ratio = 5
kernel.nmi_watchdog = 0
